<style>

    .btn-ghost {
    background: transparent;
    border: 1px solid #e2e8f0;
    color: #475569;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-ghost:hover {
    background: #f8fafc;
    color: #1e293b;
    border-color: #cbd5e1;
}

.btn-ghost:active {
    transform: translateY(1px);
}

</style>

<form method="POST" action="{{ request.path }}">
    {% csrf_token %}
    
    <div class="modal-header">
        <h3 class="modal-title">Confirmar Exclusão</h3>
        <button type="button" class="btn-close" onclick="closeActionModal()">✕</button>
    </div>
    
    <div class="modal-body">
        <p style="font-size: 15px; color: #475569;">
            Tem certeza que deseja excluir a rescisão do funcionário <strong>{{ object.funcionario.nome }}</strong>?
        </p>
        <div style="margin-top: 10px; padding: 15px; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 8px; color: #b91c1c; font-size: 13px;">
            ⚠️ O registro será apagado permanentemente.
        </div>
    </div>
    
    <div class="modal-footer">
        <button type="button" class="btn-ghost" onclick="closeActionModal()">Cancelar</button>
        <button type="submit" class="rh-btn-primary" style="background: #ef4444; border-color: #ef4444;">Confirmar Exclusão</button>
    </div>
</form>
