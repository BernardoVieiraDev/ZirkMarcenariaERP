{% extends "core/base.html" %}
{% block content %}
<h2>Novo Pagamento de 1/3 de Férias</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="{% url 'ferias:listar_pagamentos' %}" class="btn btn-secondary">Voltar</a>
</form>

<script>
    const selectFuncionario = document.getElementById("id_funcionario");
    const campoValor = document.getElementById("id_valor_a_pagar");

    selectFuncionario.addEventListener("change", () => {
        const option = selectFuncionario.options[selectFuncionario.selectedIndex];
        const texto = option.textContent;
        const salarioMatch = texto.match(/Salário: R\$ ([\d.,]+)/);
        if (salarioMatch) {
            const salario = parseFloat(salarioMatch[1].replace(".", "").replace(",", "."));
            const umTerco = (salario / 3);
            campoValor.value = umTerco.toFixed(2).replace(".", ",");
        }
    });
</script>
{% endblock %}
