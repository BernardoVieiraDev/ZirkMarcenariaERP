{% extends "core/base.html" %}
{% load static %}

{% block content %}
<h2>Banco de Horas – {{ funcionario.nome }}</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="mt-3">
        {{ form.as_p }}
    </div>

    <button class="btn btn-primary" type="submit">Salvar</button>
</form>

<a href="{% url 'ferias:listar_funcionarios' %}" class="btn btn-secondary mt-3">Voltar</a>
{% endblock %}
