<form method="POST" action="{{ request.path }}">
    {% csrf_token %}
    
    <div class="modal-header">
        <h3 class="modal-title">{{ title }}</h3>
        <button type="button" class="btn-close" onclick="closeActionModal()">✕</button>
    </div>
    
    <div class="modal-body">
        <div class="form-group">
            <label>Funcionário</label>
            <input type="text" value="{{ banco.funcionario.nome }}" disabled style="background-color: #f1f5f9; color: #64748b;">
        </div>

        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color:red; font-size:11px; margin-top:2px;">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
    </div>
    
    <div class="modal-footer">
        <button type="button" class="btn-ghost" onclick="closeActionModal()">Cancelar</button>
        <button type="submit" class="rh-btn-primary">Salvar Alterações</button>
    </div>
</form>
