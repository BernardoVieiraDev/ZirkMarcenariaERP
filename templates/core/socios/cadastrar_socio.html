{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<style>
    /* === Zirk Design System - Cadastro === */
    :root {
        --text-dark: #0f172a;
        --text-main: #334155;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --primary-blue: #1f6feb;
        --primary-blue-hover: #1a5dbd;
        --surface: #ffffff;
    }

    .page-container {
        width: 100%;
        padding: 0 20px;
        font-family: Inter, -apple-system, sans-serif;
        color: var(--text-main);
    }

    /* === Header === */
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }
    
    .header-icon {
        height: 48px; width: 48px;
        background-color: #eff6ff;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        color: var(--primary-blue);
        box-shadow: 0 2px 4px rgba(31, 111, 235, 0.05);
        font-size: 20px;
    }

    .header-content h1 { font-size: 22px; font-weight: 700; color: var(--text-dark); margin: 0; }
    .header-content p { font-size: 13px; color: var(--text-muted); margin: 0; }

    /* === Card de Formulário === */
    .zirk-card {
        background: var(--surface);
        border-radius: 16px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        border: 1px solid var(--border-color);
        padding: 32px;
    }

    /* Inputs */
    .zirk-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
        letter-spacing: 0.025em;
    }

    /* Estiliza o input gerado pelo Django */
    .zirk-card input[type="text"] {
        display: block;
        width: 100%;
        padding: 12px 16px;
        font-size: 0.95rem;
        font-weight: 500;
        line-height: 1.5;
        color: var(--text-dark);
        background-color: #fff;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        transition: all 0.2s ease-in-out;
    }

    .zirk-card input[type="text"]:focus {
        border-color: var(--primary-blue);
        outline: 0;
        box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.1);
    }

    /* Botões */
    .actions-row {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    .btn-zirk {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 24px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
        cursor: pointer;
        width: 100%;
    }

    .btn-save {
        background: var(--primary-blue);
        color: white;
        border: none;
        box-shadow: 0 4px 6px rgba(31, 111, 235, 0.2);
    }
    .btn-save:hover {
        background: var(--primary-blue-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 8px rgba(31, 111, 235, 0.25);
    }

    .btn-cancel {
        background: white;
        color: var(--text-muted);
        border: 1px solid var(--border-color);
    }
    .btn-cancel:hover {
        background: #f8fafc;
        color: var(--text-dark);
        border-color: #cbd5e1;
    }

</style>

<div class="page-container">
    
    <div class="page-header justify-content-center">
        <div class="header-left">
            <div class="header-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <div class="header-content">
                <h1>Cadastrar Sócio</h1>
                <p>Adicione um novo sócio para controle de despesas</p>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="zirk-card">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="id_nome" class="zirk-label">Nome Completo</label>
                        {{ form.nome }}
                        
                        {% if form.nome.errors %}
                            <div class="mt-2 text-danger small" style="font-weight: 500;">
                                <i class="fas fa-exclamation-circle me-1"></i>
                                {{ form.nome.errors.0 }}
                            </div>
                        {% endif %}
                    </div>

                    <div class="actions-row">
                        <a href="{% url 'socios:registrar_despesa' %}" class="btn-zirk btn-cancel">
                            Cancelar
                        </a>
                        <button type="submit" class="btn-zirk btn-save">
                            <i class="fas fa-check me-2"></i> Salvar Sócio
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
{% endblock %}
