{% extends 'core/base.html' %}

{% block content %}
<div class="page-container" style="padding: 40px 20px; text-align: center;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div style="background: white; border-radius: 16px; padding: 40px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);">
                
                <div style="width: 64px; height: 64px; background: #fee2e2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 24px;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>

                <h2 style="font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 12px;">Excluir Sócio?</h2>
                <p style="color: #64748b; margin-bottom: 32px; line-height: 1.5;">
                    Você tem certeza que deseja remover <strong>{{ socio.nome }}</strong>?<br>
                    Esta ação pode afetar os relatórios históricos vinculados a este sócio.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div style="display: flex; gap: 12px;">
                        <a href="{% url 'socios:listar_socios' %}" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; color: #475569; text-decoration: none; font-weight: 600; background: white;">
                            Cancelar
                        </a>
                        <button type="submit" style="flex: 1; padding: 12px; border-radius: 10px; border: none; background: #ef4444; color: white; font-weight: 600; cursor: pointer;">
                            Sim, Excluir
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
