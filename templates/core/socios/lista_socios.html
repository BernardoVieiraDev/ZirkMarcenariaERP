{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --primary-blue: #1f6feb;
        --text-dark: #0f172a;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
    }
    
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header-title h1 { font-size: 22px; font-weight: 700; color: var(--text-dark); margin: 0; }
    
    .zirk-table-card {
        background: #fff; border-radius: 16px; border: 1px solid var(--border-color);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); overflow: hidden;
    }
    
    .table-responsive { width: 100%; overflow-x: auto; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { 
        background: #f8fafc; text-align: left; padding: 16px 24px;
        font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600;
        border-bottom: 1px solid var(--border-color);
    }
    .table td { padding: 16px 24px; border-bottom: 1px solid var(--border-color); color: var(--text-dark); vertical-align: middle; }
    .table tr:last-child td { border-bottom: none; }
    
    .action-btn { 
        padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.2s; 
        display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent;
    }
    .btn-edit { background: #eff6ff; color: var(--primary-blue); border-color: #dbeafe; }
    .btn-edit:hover { background: #dbeafe; }
    
    .btn-delete { background: #fef2f2; color: #ef4444; border-color: #fee2e2; }
    .btn-delete:hover { background: #fee2e2; }

    .btn-add {
        background: var(--primary-blue); color: white; padding: 10px 20px; border-radius: 10px; 
        text-decoration: none; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-add:hover { background: #1a5dbd; color: white; }
</style>

<div class="page-container" style="padding: 0 20px;">
    
    <div class="page-header">
        <div class="header-title">
            <h1>Gestão de Sócios</h1>
            <p style="color: var(--text-muted); font-size: 13px;">Gerencie os sócios cadastrados no sistema</p>
        </div>
        <a href="{% url 'socios:cadastrar_socio' %}" class="btn-add">
            <i class="fas fa-plus"></i> Novo Sócio
        </a>
    </div>

    <div class="zirk-table-card">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nome do Sócio</th>
                        <th style="width: 200px; text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for socio in socios %}
                    <tr>
                        <td>
                            <div style="font-weight: 600;">{{ socio.nome }}</div>
                        </td>
                        <td style="text-align: right;">
                            <a href="{% url 'socios:editar_socio' socio.id %}" class="action-btn btn-edit">
                                <i class="fas fa-edit"></i> Editar
                            </a>
                            <a href="{% url 'socios:excluir_socio' socio.id %}" class="action-btn btn-delete">
                                <i class="fas fa-trash"></i> Excluir
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" style="text-align: center; padding: 40px; color: var(--text-muted);">
                            Nenhum sócio cadastrado.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
